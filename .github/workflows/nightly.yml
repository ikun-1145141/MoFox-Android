name: Nightly Build

on:
  schedule:
    # 每天 UTC 18:00 = Asia/Shanghai 02:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      flavor:
        description: '构建类型'
        type: choice
        options: [debug, release]
        default: debug

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Android APK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FLAVOR: ${{ inputs.flavor || 'debug' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            flutter_target: android-arm64
            bootstrap_file: bootstrap-aarch64.zip
            bootstrap_url: https://github.com/termux/termux-packages/releases/download/bootstrap-2026.06.07-r1%2Bapt.android-7/bootstrap-aarch64.zip
          - abi: armeabi-v7a
            flutter_target: android-arm
            bootstrap_file: bootstrap-arm.zip
            bootstrap_url: https://github.com/termux/termux-packages/releases/download/bootstrap-2026.06.07-r1%2Bapt.android-7/bootstrap-arm.zip
          - abi: x86_64
            flutter_target: android-x64
            bootstrap_file: bootstrap-x86_64.zip
            bootstrap_url: https://github.com/termux/termux-packages/releases/download/bootstrap-2026.06.07-r1%2Bapt.android-7/bootstrap-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Show toolchain
        working-directory: app
        run: |
          flutter --version
          java -version

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        continue-on-error: true
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: app
        continue-on-error: true
        run: flutter test

      - name: Fetch Termux bootstrap (${{ matrix.abi }})
        run: |
          set -euo pipefail
          rm -f app/assets/runtime/bootstrap-*.zip app/assets/runtime/bootstrap.sha256
          curl --fail --location --retry 3 --output "app/assets/runtime/${{ matrix.bootstrap_file }}" "${{ matrix.bootstrap_url }}"
          (cd app/assets/runtime && sha256sum "${{ matrix.bootstrap_file }}" > bootstrap.sha256)
          cat app/assets/runtime/bootstrap.sha256

      - name: Build APK
        run: |
          if [ "$FLAVOR" = "release" ]; then
            python tools/build.py --release --no-pub-get --target-platform ${{ matrix.flutter_target }} --artifact-label ${{ matrix.abi }}
          else
            python tools/build.py --no-pub-get --target-platform ${{ matrix.flutter_target }} --artifact-label ${{ matrix.abi }}
          fi

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mofox-android-${{ env.FLAVOR }}-${{ matrix.abi }}-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

  publish-nightly:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      FLAVOR: ${{ inputs.flavor || 'debug' }}

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mofox-android-${{ env.FLAVOR }}-*-${{ github.run_number }}
          merge-multiple: true

      - name: List release files
        run: ls -lh dist/

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build #${{ github.run_number }}"
          body: |
            自动构建的 nightly APK。

            - Commit: `${{ github.sha }}`
            - Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Flavor: `${{ env.FLAVOR }}`

            > nightly tag 会被覆盖，仅作最新预览，不保证稳定性。
          files: dist/*.apk
          prerelease: true
          make_latest: false
