name: Nightly Build

on:
  schedule:
    # 每天 UTC 18:00 = Asia/Shanghai 02:00
    - cron: '0 18 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: '构建类型'
        type: choice
        options: [debug, release]
        default: debug

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FLAVOR: ${{ inputs.flavor || 'debug' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Show toolchain
        working-directory: app
        run: |
          flutter --version
          java -version

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        continue-on-error: true
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: app
        continue-on-error: true
        run: flutter test

      - name: Build APK
        run: |
          if [ "$FLAVOR" = "release" ]; then
            python tools/build.py --release --no-pub-get
          else
            python tools/build.py --no-pub-get
          fi

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mofox-android-${{ env.FLAVOR }}-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish nightly release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build #${{ github.run_number }}"
          body: |
            自动构建的 nightly APK。

            - Commit: `${{ github.sha }}`
            - Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Flavor: `${{ env.FLAVOR }}`

            > nightly tag 会被覆盖，仅作最新预览，不保证稳定性。
          files: dist/*.apk
          prerelease: true
          make_latest: false
