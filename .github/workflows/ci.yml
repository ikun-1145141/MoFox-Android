name: CI

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: app
        run: flutter test

  build:
    name: Build APK
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # PR 不构建 APK，避免和 push 双跑；fork PR 也拿不到 secrets
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Show toolchain
        working-directory: app
        run: |
          flutter --version
          java -version

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Build APK
        run: python tools/build.py --no-pub-get

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mofox-android-debug-${{ github.run_number }}-${{ github.sha }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14
