name: mofox_android
description: Neo-MoFox 的安卓原生外壳 App。WebView 套自家 WebUI，原生壳负责 OOBE / 内嵌 Termux 运行时 / 终端 / 保活与系统级设置。
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态 + 路由
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # 序列化 / 数据
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # 持久化
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # 网络（仅健康检查 / 版本协商）
  dio: ^5.5.0
  retrofit: ^4.1.0

  # 平台与 UI 组件
  # 用 webview_flutter (官方维护)，不引 flutter_inappwebview——
  # 后者 1.1.3 的 Gradle 用了 proguard-android.txt，新版 AGP 已拒绝。
  webview_flutter: ^4.8.0
  xterm: ^4.0.0
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # 日志
  logger: ^2.3.0

  # 工具
  collection: ^1.18.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.0
  drift_dev: ^2.18.0

  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/runtime/
    - assets/scripts/
